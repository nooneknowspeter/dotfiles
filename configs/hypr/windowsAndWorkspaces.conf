# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

windowrule {
    # XWayland empty floating window workaround (prevents drag/focus glitches)
    name = xwayland-empty-nofocus
    match:class = ^$
    match:title = ^$
    match:xwayland = on
    match:float = on
    match:fullscreen = off
    match:pin = off
    no_focus = on
}

windowrule {
    name = no-initial-freecad
    match:class = FreeCAD
    no_initial_focus = on
}

windowrule {
    name = no-initial-ardour
    match:class = Ardour8
    no_initial_focus = on
}
